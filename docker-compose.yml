version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: equalvoice_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_123}
      MYSQL_DATABASE: ${DB_NAME:-equalvoice_db}
      MYSQL_USER: ${DB_USER:-equalvoice_user}
      MYSQL_PASSWORD: ${DB_PASS:-user_password_456}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - equalvoice_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password_123}"]
      timeout: 20s
      retries: 10
      interval: 10s

  # PHP Apache Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equalvoice_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME:-equalvoice_db}
      - DB_USER=${DB_USER:-equalvoice_user}
      - DB_PASS=${DB_PASS:-user_password_456}
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/apache.conf:/etc/apache2/sites-available/000-default.conf
      - apache_logs:/var/log/apache2
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - equalvoice_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: equalvoice_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-equalvoice_user}
      PMA_PASSWORD: ${DB_PASS:-user_password_456}
      PMA_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_123}
    depends_on:
      - mysql
    networks:
      - equalvoice_network

volumes:
  mysql_data:
    driver: local
  apache_logs:
    driver: local

networks:
  equalvoice_network:
    driver: bridge
