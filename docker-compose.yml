services:

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: equalvoice_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_123}
      MYSQL_DATABASE:      ${DB_NAME:-equalvoice_db}
      MYSQL_USER:          ${DB_USER:-equalvoice_user}
      MYSQL_PASSWORD:      ${DB_PASS:-user_password_456}
      MYSQL_ROOT_HOST:     '%'
    # No fixed host port → Docker assigns a random free port. This is what CI
    # needs so concurrent builds don't clash. For predictable local dev ports
    # use docker-compose.override.yml (auto-applied when you run `docker compose
    # up` without -f).
    ports:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    networks:
      - equalvoice_network
    # IMPORTANT: must use TCP (-h 127.0.0.1 + --protocol=tcp on port 3306).
    # The MySQL official image starts a temporary socket-only server (port=0)
    # during init; a plain `-h localhost` ping passes against that temp server,
    # which makes compose mark MySQL "healthy" before the real server is ready.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping",
             "-h", "127.0.0.1", "-P", "3306", "--protocol=tcp",
             "-u", "root", "--password=${DB_ROOT_PASSWORD:-root_password_123}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── PHP / Apache web server ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VCS_REF:    ${VCS_REF:-unknown}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    container_name: equalvoice_web
    restart: unless-stopped
    # Random host port in CI; see docker-compose.override.yml for the fixed
    # local-dev mapping (8000 -> container 80).
    ports:
      - "80"
    environment:
      DB_HOST:          mysql
      DB_NAME:          ${DB_NAME:-equalvoice_db}
      DB_USER:          ${DB_USER:-equalvoice_user}
      DB_PASS:          ${DB_PASS:-user_password_456}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_123}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - equalvoice_network
    # We only need to know "is Apache responding?" — not "is the app
    # returning 2xx?". `curl -sS -o /dev/null -w '%{http_code}'` succeeds on
    # any HTTP response (including 3xx/4xx/5xx) and fails only on a connection
    # error, which is exactly the right signal for a container healthcheck.
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -o /dev/null --max-time 5 http://localhost/index.php"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ── phpMyAdmin ────────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: equalvoice_pma
    restart: unless-stopped
    # Random host port in CI; see docker-compose.override.yml for the fixed
    # local-dev mapping (8081 -> container 80) which avoids clashing with
    # Jenkins on host port 8080.
    ports:
      - "80"
    environment:
      PMA_HOST:          mysql
      PMA_USER:          ${DB_USER:-equalvoice_user}
      PMA_PASSWORD:      ${DB_PASS:-user_password_456}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_123}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - equalvoice_network

volumes:
  mysql_data:
    driver: local

networks:
  equalvoice_network:
    driver: bridge
