<VirtualHost *:80>
    ServerAdmin admin@equalvoice.local
    ServerName equalvoice.local
    ServerAlias www.equalvoice.local

    DocumentRoot /var/www/html

    # ── /equalvoice/* alias ──────────────────────────────────────────────
    # The PHP pages hardcode "/equalvoice/css/main.css", "/equalvoice/js/...",
    # etc. — correct for XAMPP where the app sits under htdocs/equalvoice,
    # but in Docker the app is the document root. These aliases make BOTH
    # URL forms resolve to the same files:
    #   http://localhost:8000/css/main.css
    #   http://localhost:8000/equalvoice/css/main.css
    # so the hardcoded paths in the PHP source keep working unchanged.
    Alias /equalvoice/ /var/www/html/
    Alias /equalvoice  /var/www/html

    # Enable mod_rewrite for clean URLs
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite rules for clean URLs
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php?/$1 [QSA,L]
        </IfModule>
    </Directory>

    # Security headers
    <IfModule mod_headers.c>
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"
        Header set X-XSS-Protection "1; mode=block"
        Header set Referrer-Policy "strict-origin-when-cross-origin"
        Header set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    </IfModule>

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Cache control for static files
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/gif "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType text/css "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </IfModule>

    # Disable directory listing
    <Directory /var/www/html>
        Options -Indexes
    </Directory>

    # Protect sensitive files
    <FilesMatch "\.env|\.git|composer\.json|composer\.lock|Dockerfile|Jenkinsfile|\.sql$">
        Require all denied
    </FilesMatch>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Performance tuning
    KeepAlive On
    KeepAliveTimeout 65
</VirtualHost>

# Redirect HTTP to HTTPS (if SSL is configured)
# Uncomment these lines when SSL certificates are added
