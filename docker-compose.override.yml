# docker-compose.override.yml — LOCAL DEVELOPMENT ONLY
#
# This file is automatically merged on top of docker-compose.yml when you run
# `docker compose up` from this directory. It is NOT loaded when an explicit
# `-f docker-compose.yml` flag is used (which is exactly what the Jenkins
# pipeline does), so it has zero effect on CI.
#
# After `docker compose up -d`, open the app at the SAME URL every time:
#
#   App        → http://localhost:8000/
#   phpMyAdmin → http://localhost:8081/
#   MySQL CLI  → docker compose exec mysql mysql -u equalvoice_user -p equalvoice_db
#
# Port choices and why they don't collide:
#   8000  → XAMPP Apache already owns 80, so we use 8000 instead
#   8081  → Jenkins already owns 8080, so we use 8081 instead
#
# MySQL is intentionally NOT bound to a host port:
#   - phpMyAdmin (above) covers the browsing/SQL-runner use case.
#   - The web container talks to it over the internal "mysql" hostname.
#   - This avoids clashing with XAMPP MySQL, which on some setups is on 3307
#     instead of 3306.
#   If you really want a host-port for an external client (e.g. DBeaver),
#   uncomment the `mysql:` block at the bottom and pick a free port.

services:
  web:
    ports:
      - "8000:80"

  phpmyadmin:
    ports:
      - "8081:80"

  # mysql:
  #   ports:
  #     - "3308:3306"   # pick whatever is free; 3306/3307 may be XAMPP's
